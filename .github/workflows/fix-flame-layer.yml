name: Fix flame orb layering

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-flame-layer.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply visual fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          css_path = Path('public/styles.css')
          app_path = Path('public/app.js')
          sw_path = Path('public/service-worker.js')

          css = css_path.read_text(encoding='utf-8')

          css = css.replace(
          """#flameCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
          }""",
          """#flameCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
          }""",
          1)

          css = css.replace(
          """.ignition-core,
          .ignition-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
          }""",
          """.ignition-core,
          .ignition-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
          }

          .ignition-core {
            z-index: 0;
          }

          .ignition-ring {
            z-index: 3;
            pointer-events: none;
          }""",
          1)

          css = css.replace(
          """.ignition-text {
            position: relative;
            z-index: 2;
            font-size: 1.08rem;
            font-weight: 850;
            line-height: 1.35;
            text-shadow: 0 2px 14px #000;
            pointer-events: none;
          }""",
          """.ignition-text {
            position: relative;
            z-index: 4;
            font-size: 1.08rem;
            font-weight: 850;
            line-height: 1.35;
            text-shadow: 0 2px 14px #000, 0 0 18px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            transition: transform 260ms ease, opacity 260ms ease, font-size 260ms ease;
          }

          .ignition-button.lit .ignition-text {
            transform: translateY(74px);
            opacity: 0.82;
            font-size: 0.76rem;
            letter-spacing: 0.08em;
          }""",
          1)

          css = css.replace(
          """.tap-ripples {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
          }""",
          """.tap-ripples {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: grid;
            place-items: center;
            pointer-events: none;
          }""",
          1)

          css += """

          /* Ensure the animated flame stays visible inside the orb. */
          .ignition-button.lit .ignition-core {
            opacity: 0.72;
          }

          .ignition-button:not(.lit) + .tap-ripples {
            z-index: 5;
          }
          """

          css_path.write_text(css, encoding='utf-8')

          app = app_path.read_text(encoding='utf-8')
          app = app.replace("elements.ignitionText.innerHTML = '火種<br>已成';", "elements.ignitionText.innerHTML = '火種已成';", 1)
          app = app.replace("elements.ignitionText.innerHTML = '火種<br>燃燒中';", "elements.ignitionText.innerHTML = '燃燒中';", 1)
          app_path.write_text(app, encoding='utf-8')

          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('fire-passing-shell-v2', 'fire-passing-shell-v3')
          sw_path.write_text(sw, encoding='utf-8')
          PY
          node --check public/app.js
          node --check server.js
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/styles.css public/app.js public/service-worker.js
          git rm .github/workflows/fix-flame-layer.yml
          git commit -m "Fix flame visibility inside orb"
          git push origin main
