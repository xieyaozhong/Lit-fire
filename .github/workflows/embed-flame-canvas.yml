name: Embed flame canvas inside ignition orb

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/embed-flame-canvas.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Move renderer into the orb
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          html_path = Path('public/index.html')
          css_path = Path('public/styles.css')
          app_path = Path('public/app.js')
          sw_path = Path('public/service-worker.js')

          html = html_path.read_text(encoding='utf-8')
          old_html = '''        <div id="ignitionStage" class="ignition-stage">
          <canvas id="flameCanvas" aria-hidden="true"></canvas>
          <button id="ignitionButton" class="ignition-button" type="button" aria-label="點擊點火">
            <span class="ignition-core"></span>
            <span class="ignition-ring"></span>
            <span id="ignitionText" class="ignition-text">點擊<br />點火</span>
          </button>
          <div id="tapRipples" class="tap-ripples" aria-hidden="true"></div>
        </div>'''
          new_html = '''        <div id="ignitionStage" class="ignition-stage">
          <button id="ignitionButton" class="ignition-button" type="button" aria-label="點擊點火">
            <span class="ignition-core"></span>
            <canvas id="flameCanvas" aria-hidden="true"></canvas>
            <span class="ignition-ring"></span>
            <span id="ignitionText" class="ignition-text">點擊<br />點火</span>
          </button>
          <div id="tapRipples" class="tap-ripples" aria-hidden="true"></div>
        </div>'''
          if old_html not in html:
              raise SystemExit('ignition HTML block not found')
          html = html.replace(old_html, new_html, 1)
          html_path.write_text(html, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          old_canvas = '''#flameCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
          }'''
          new_canvas = '''#flameCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            overflow: visible;
          }'''
          if old_canvas not in css:
              raise SystemExit('canvas CSS block not found')
          css = css.replace(old_canvas, new_canvas, 1)

          css += '''

          /* The renderer now lives inside the clickable orb. */
          .ignition-button.lit #flameCanvas {
            filter: saturate(1.14) brightness(1.08);
          }

          .ignition-button:not(.lit) #flameCanvas {
            opacity: 0;
          }

          .ignition-button.lit .ignition-core {
            opacity: 0.42;
          }
          '''
          css_path.write_text(css, encoding='utf-8')

          app = app_path.read_text(encoding='utf-8')
          old_size = '''  function getSize() {
            const rect = elements.ignitionStage.getBoundingClientRect();
            resizeCanvas(canvas, ctx, rect.width, rect.height);
            return rect;
          }'''
          new_size = '''  function getSize() {
            const rect = elements.ignitionButton.getBoundingClientRect();
            resizeCanvas(canvas, ctx, rect.width, rect.height);
            return rect;
          }'''
          if old_size not in app:
              raise SystemExit('renderer size block not found')
          app = app.replace(old_size, new_size, 1)

          app = app.replace('      const cy = height * 0.53;\n      const radius = Math.min(width, height) * 0.29;',
                            '      const cy = height * 0.5;\n      const radius = Math.min(width, height) * 0.42;', 1)

          app = app.replace('      const baseY = cy + radius * 0.54;',
                            '      const baseY = cy + radius * 0.56;', 1)

          app_path.write_text(app, encoding='utf-8')

          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('fire-passing-shell-v4', 'fire-passing-shell-v5')
          sw_path.write_text(sw, encoding='utf-8')
          PY
          node --check public/app.js
          node --check server.js
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/styles.css public/app.js public/service-worker.js
          git rm .github/workflows/embed-flame-canvas.yml
          git commit -m "Keep flame animation visible inside orb"
          git push origin main
