name: Add accelerating rainbow flame

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-rainbow-flame.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Add rainbow flame type and accelerating rhythm
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path('public/app.js')
          persistent_path = Path('public/persistent-flame.js')
          server_path = Path('server.js')
          index_path = Path('public/index.html')
          sw_path = Path('public/service-worker.js')
          css_path = Path('public/styles.css')

          app = app_path.read_text(encoding='utf-8')

          old_types = """  spark: {
            name: '星火',
            description: '帶有切分與驚喜的節奏，迸發金白色的傳承火種。',
            colors: ['#ffffff', '#ffe47d', '#ff9d42', '#e64535'],
            sigil: '✦'
          }
          };"""
          new_types = """  spark: {
            name: '星火',
            description: '帶有切分與驚喜的節奏，迸發金白色的傳承火種。',
            colors: ['#ffffff', '#ffe47d', '#ff9d42', '#e64535'],
            sigil: '✦'
          },
          rainbow: {
            name: '虹焰',
            description: '越點越快的加速節奏，喚醒紅、橙、黃、綠、藍、靛、紫交織的七彩火焰。',
            colors: ['#ff3b30', '#ff9500', '#ffd60a', '#34c759', '#0a84ff', '#5856d6', '#bf5af2'],
            sigil: '◉'
          }
          };"""
          if old_types not in app:
              raise SystemExit('FLAME_TYPES block not found')
          app = app.replace(old_types, new_types, 1)

          old_classify = """function classifyRhythm(intervals) {
            const avg = mean(intervals);
            const std = standardDeviation(intervals);
            const variation = avg ? std / avg : 0;
          
            if (avg < 290) return 'azure';
            if (avg > 720) return 'dream';
            if (variation < 0.13) return 'ember';
          
            const alternationScores = [];
            for (let index = 1; index < intervals.length; index += 1) {
              alternationScores.push(Math.abs(intervals[index] - intervals[index - 1]) / Math.max(intervals[index], intervals[index - 1]));
            }
            if (variation > 0.42 || mean(alternationScores) > 0.38) return 'forest';
            return 'spark';
          }"""
          new_classify = """function isAcceleratingRhythm(intervals) {
            if (intervals.length < 3) return false;
          
            let clearDecreases = 0;
            let nonIncreases = 0;
            for (let index = 1; index < intervals.length; index += 1) {
              if (intervals[index] <= intervals[index - 1] * 0.92) clearDecreases += 1;
              if (intervals[index] <= intervals[index - 1] * 1.02) nonIncreases += 1;
            }
          
            const steps = intervals.length - 1;
            const enoughClearDecreases = clearDecreases >= Math.ceil(steps * 0.66);
            const mostlyNonIncreasing = nonIncreases >= steps - 1;
            const strongOverallAcceleration = intervals.at(-1) <= intervals[0] * 0.68;
            return enoughClearDecreases && mostlyNonIncreasing && strongOverallAcceleration;
          }
          
          function classifyRhythm(intervals) {
            const avg = mean(intervals);
            const std = standardDeviation(intervals);
            const variation = avg ? std / avg : 0;
          
            if (isAcceleratingRhythm(intervals)) return 'rainbow';
            if (avg < 290) return 'azure';
            if (avg > 720) return 'dream';
            if (variation < 0.13) return 'ember';
          
            const alternationScores = [];
            for (let index = 1; index < intervals.length; index += 1) {
              alternationScores.push(Math.abs(intervals[index] - intervals[index - 1]) / Math.max(intervals[index], intervals[index - 1]));
            }
            if (variation > 0.42 || mean(alternationScores) > 0.38) return 'forest';
            return 'spark';
          }"""
          if old_classify not in app:
              raise SystemExit('classifyRhythm block not found')
          app = app.replace(old_classify, new_classify, 1)

          app = app.replace(
              "  elements.ignitionButton.classList.add('lit');\n  elements.ignitionButton.style.setProperty('--flame-primary', colors[1] || colors[0]);",
              "  elements.ignitionButton.classList.add('lit');\n  elements.ignitionButton.dataset.flameType = flame.type || 'ember';\n  elements.ignitionButton.style.setProperty('--flame-primary', colors[1] || colors[0]);",
              1,
          )
          app = app.replace(
              "  elements.ignitionButton.classList.remove('lit');\n  elements.ignitionButton.style.removeProperty('--flame-primary');",
              "  elements.ignitionButton.classList.remove('lit');\n  delete elements.ignitionButton.dataset.flameType;\n  elements.ignitionButton.style.removeProperty('--flame-primary');",
              1,
          )
          app_path.write_text(app, encoding='utf-8')

          persistent = persistent_path.read_text(encoding='utf-8')
          helper_anchor = """  function rgba(rgb, alpha) {
            return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
          }
          """
          helper_new = """  function rgba(rgb, alpha) {
            return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
          }
          
          function hslToRgb(hue, saturation = 1, lightness = 0.58) {
            const h = ((hue % 360) + 360) % 360 / 360;
            const hueToRgb = (p, q, t) => {
              let value = t;
              if (value < 0) value += 1;
              if (value > 1) value -= 1;
              if (value < 1 / 6) return p + (q - p) * 6 * value;
              if (value < 1 / 2) return q;
              if (value < 2 / 3) return p + (q - p) * (2 / 3 - value) * 6;
              return p;
            };
            const q = lightness < 0.5
              ? lightness * (1 + saturation)
              : lightness + saturation - lightness * saturation;
            const p = 2 * lightness - q;
            return [
              Math.round(hueToRgb(p, q, h + 1 / 3) * 255),
              Math.round(hueToRgb(p, q, h) * 255),
              Math.round(hueToRgb(p, q, h - 1 / 3) * 255)
            ];
          }
          """
          if helper_anchor not in persistent:
              raise SystemExit('rgba helper not found')
          persistent = persistent.replace(helper_anchor, helper_new, 1)

          old_colors = """    const styles = getComputedStyle(button);
            const primary = parseColor(styles.getPropertyValue('--flame-primary'), [255, 154, 72]);
            const secondary = parseColor(styles.getPropertyValue('--flame-secondary'), [255, 78, 53]);
            const light = primary.map((value) => Math.min(255, value + 80));
            const dark = secondary.map((value) => Math.max(0, value - 45));
          """
          new_colors = """    const styles = getComputedStyle(button);
            const isRainbow = button.dataset.flameType === 'rainbow';
            const rainbowHue = (time * 0.055) % 360;
            const primary = isRainbow
              ? hslToRgb(rainbowHue, 1, 0.58)
              : parseColor(styles.getPropertyValue('--flame-primary'), [255, 154, 72]);
            const secondary = isRainbow
              ? hslToRgb(rainbowHue + 72, 1, 0.55)
              : parseColor(styles.getPropertyValue('--flame-secondary'), [255, 78, 53]);
            const light = isRainbow
              ? hslToRgb(rainbowHue + 144, 0.95, 0.72)
              : primary.map((value) => Math.min(255, value + 80));
            const dark = isRainbow
              ? hslToRgb(rainbowHue + 288, 1, 0.38)
              : secondary.map((value) => Math.max(0, value - 45));
          """
          if old_colors not in persistent:
              raise SystemExit('persistent flame color block not found')
          persistent = persistent.replace(old_colors, new_colors, 1)
          persistent_path.write_text(persistent, encoding='utf-8')

          server = server_path.read_text(encoding='utf-8')
          server = server.replace('.slice(0, 4)', '.slice(0, 7)', 1)
          server_path.write_text(server, encoding='utf-8')

          index = index_path.read_text(encoding='utf-8')
          index = index.replace('/persistent-flame.js?v=1', '/persistent-flame.js?v=2')
          index_path.write_text(index, encoding='utf-8')

          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('fire-passing-shell-v6', 'fire-passing-shell-v7')
          sw = sw.replace('/persistent-flame.js?v=1', '/persistent-flame.js?v=2')
          sw_path.write_text(sw, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          css += """
          
          .ignition-button[data-flame-type="rainbow"] .ignition-ring {
            border-color: rgba(255, 255, 255, 0.72);
            animation: slow-spin 8s linear infinite, rainbow-hue 3.6s linear infinite;
            box-shadow: 0 0 26px rgba(255, 255, 255, 0.28), inset 0 0 24px rgba(255, 255, 255, 0.16);
          }
          
          .flame-card:not(.empty)[style*="#ff9500"] {
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.13), rgba(52, 199, 89, 0.1), rgba(88, 86, 214, 0.14));
          }
          
          @keyframes rainbow-hue {
            from { filter: hue-rotate(0deg) brightness(1.12); }
            to { filter: hue-rotate(360deg) brightness(1.12); }
          }
          """
          css_path.write_text(css, encoding='utf-8')
          PY
          node --check public/app.js
          node --check public/persistent-flame.js
          node --check server.js
      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/app.js public/persistent-flame.js public/index.html public/styles.css public/service-worker.js server.js
          git rm .github/workflows/add-rainbow-flame.yml
          git commit -m "Add accelerating rainbow flame"
          git push origin main
